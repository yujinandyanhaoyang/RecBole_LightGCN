USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp
load_col:
  inter: [user_id, item_id, rating, timestamp]
data_path: ./
dataset: amazon_books_smoke
checkpoint_dir: ./saved/
use_gpu: false
gpu_id: 0
worker: 0
seed: 2020
reproducibility: true
show_progress: true
save_dataset: true
save_dataloaders: true
eval_args:
  split: {'LS': 'valid_only'}
  group_by: user
  order: RO
  mode: full
metrics: [NDCG, MRR, Hit]
topk: 10
valid_metric: NDCG@10
train_neg_sample_args:
  distribution: uniform
  sample_num: 1
  alpha: 1.0
  dynamic: false
  candidate_num: 0
epochs: 10
train_batch_size: 1024
eval_batch_size: 100
learning_rate: 0.001
embedding_size: 64
n_layers: 2
reg_weight: 1e-05
